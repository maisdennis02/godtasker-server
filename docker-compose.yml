services:
  postgres:
    image: postgres:17-alpine
    container_name: godtasker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-docker}
      POSTGRES_DB: ${DB_NAME:-godtasker}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - godtasker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  godtasker_pgdata:
